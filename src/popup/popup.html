<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <div class="container">

        <h2>JSON &#8594; C# Converter</h2>

        <!-- ✅ Loader -->
        <div id="loader" class="loader hidden"></div>

        <input id="root" placeholder="Root Class Name (Default: Root)" />

        <div class="section">
            <label>JSON Input</label>
            <textarea id="json" placeholder="Paste JSON here"></textarea>

            <div class="actions">
                <button id="format">Format JSON</button>
                <button id="clear">Clear</button>
            </div>
        </div>

        <button id="generate" class="primary">Generate</button>

        <div class="section">
            <label>C# Output</label>
            <textarea id="output" readonly></textarea>

            <div class="actions">
                <button id="copy">Copy</button>
                <button id="download">Download</button>
            </div>
        </div>

    </div>

    <!-- ✅ Toast -->
    <div id="toast" class="toast"></div>

    <script type="module" src="./popup.ts"></script>
</body>

</html>
